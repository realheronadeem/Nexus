<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body { background: black; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        canvas { background: white; }
        #scoreboard { color: white; font-size: 24px; position: absolute; top: 10px; }
    </style>
</head>
<body>
    <div id="scoreboard">
        Player 1: <span id="player1Score">0</span> - Player 2: <span id="player2Score">0</span>
    </div>
    <canvas id="pongCanvas" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('pongCanvas');
        const context = canvas.getContext('2d');

        // Create the pong paddle
        const paddleWidth = 10, paddleHeight = 100;
        const player1 = { x: 0, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, score: 0 };
        const player2 = { x: canvas.width - paddleWidth, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, score: 0 };

        // Create the pong ball
        const ball = { x: canvas.width / 2, y: canvas.height / 2, radius: 10, speed: 5, velocityX: 5, velocityY: 5 };

        // Draw everything
        function drawRect(x, y, width, height, color) {
            context.fillStyle = color;
            context.fillRect(x, y, width, height);
        }

        function drawArc(x, y, radius, color) {
            context.fillStyle = color;
            context.beginPath();
            context.arc(x, y, radius, 0, Math.PI * 2, false);
            context.closePath();
            context.fill();
        }

        // Update game function
        function update() {
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;

            // Ball collision with top and bottom walls
            if (ball.y + ball.radius >= canvas.height || ball.y - ball.radius <= 0) {
                ball.velocityY = -ball.velocityY;
            }

            // Ball collision with paddles
            if (ball.x - ball.radius <= player1.x + player1.width && ball.y > player1.y && ball.y < player1.y + player1.height) {
                ball.velocityX = -ball.velocityX;
            }
            if (ball.x + ball.radius >= player2.x && ball.y > player2.y && ball.y < player2.y + player2.height) {
                ball.velocityX = -ball.velocityX;
            }

            // Check if ball is out of bounds
            if (ball.x - ball.radius < 0) {
                player2.score++; resetBall();
            } else if (ball.x + ball.radius > canvas.width) {
                player1.score++; resetBall();
            }

            // Update the scoreboard
            document.getElementById('player1Score').innerText = player1.score;
            document.getElementById('player2Score').innerText = player2.score;
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.velocityX = 5;
            ball.velocityY = 5;
        }

        function gameLoop() {
            context.clearRect(0, 0, canvas.width, canvas.height);
            drawRect(player1.x, player1.y, player1.width, player1.height, 'blue');
            drawRect(player2.x, player2.y, player2.width, player2.height, 'red');
            drawArc(ball.x, ball.y, ball.radius, 'green');
            update();
            requestAnimationFrame(gameLoop);
        }

        // Control paddles
        document.addEventListener('keydown', (event) => {
            switch (event.key) {
                case 'ArrowUp':
                    if (player2.y > 0) player2.y -= 30;
                    break;
                case 'ArrowDown':
                    if (player2.y < canvas.height - paddleHeight) player2.y += 30;
                    break;
                case 'w':
                    if (player1.y > 0) player1.y -= 30;
                    break;
                case 's':
                    if (player1.y < canvas.height - paddleHeight) player1.y += 30;
                    break;
            }
        });

        // Start the game
        gameLoop();
    </script>
</body>
</html>
